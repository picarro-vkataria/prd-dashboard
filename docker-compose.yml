services:
  prd-dashboard:
    build: .
    container_name: prd-dashboard
    ports:
      - "8085:8085"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
